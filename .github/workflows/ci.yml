name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binary with Nix
        run: nix build .#default

      - name: Copy binary from Nix result
        run: cp result/bin/smeltry-operator smeltry-operator

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OCI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.nix
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/smeltry-io/smeltry-operator:${{ github.sha }},ghcr.io/smeltry-io/smeltry-operator:latest

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: nix develop --command go test ./...

  dco:
    name: DCO check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: tim-actions/dco@master

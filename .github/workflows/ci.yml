name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build and push image
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w -extldflags=-static" -o smeltry-operator .

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OCI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/smeltry-io/smeltry-operator:${{ github.sha }},ghcr.io/smeltry-io/smeltry-operator:latest

  sbom:
    name: Generate and sign SBOM
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: read
      id-token: write # required for keyless Cosign signing

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/smeltry-io/smeltry-operator:${{ github.sha }}
          format: spdx-json
          output-file: smeltry-operator-${{ github.sha }}.spdx.json
          upload-artifact: true
          upload-artifact-retention: 90

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes \
            ghcr.io/smeltry-io/smeltry-operator:${{ github.sha }}

      - name: Attach SBOM attestation with Cosign
        run: |
          cosign attest --yes \
            --predicate smeltry-operator-${{ github.sha }}.spdx.json \
            --type spdxjson \
            ghcr.io/smeltry-io/smeltry-operator:${{ github.sha }}

  dco:
    name: DCO check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on all commits in PR
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          HEAD="${{ github.event.pull_request.head.sha || github.sha }}"
          MISSING=$(git log "${BASE}..${HEAD}" --format="%H" | while read sha; do
            if ! git log -1 --format="%B" "$sha" | grep -q "^Signed-off-by:"; then
              echo "  $sha $(git log -1 --format='%s' "$sha")"
            fi
          done)
          if [ -n "$MISSING" ]; then
            echo "The following commits are missing a Signed-off-by line:"
            echo "$MISSING"
            exit 1
          fi
          echo "All commits have a Signed-off-by line."

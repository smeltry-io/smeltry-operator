name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w -extldflags=-static" -o smeltry-operator .

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OCI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/smeltry-io/smeltry-operator:${{ github.sha }},ghcr.io/smeltry-io/smeltry-operator:latest

  dco:
    name: DCO check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on all commits in PR
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          # On push to main, only check the latest commit
          if [ -z "$BASE" ]; then
            BASE="HEAD~1"
            HEAD="HEAD"
          fi
          MISSING=$(git log "${BASE}..${HEAD}" --format="%H %s" | while read sha subject; do
            if ! git log -1 --format="%B" "$sha" | grep -q "^Signed-off-by:"; then
              echo "  $sha $subject"
            fi
          done)
          if [ -n "$MISSING" ]; then
            echo "The following commits are missing a Signed-off-by line:"
            echo "$MISSING"
            exit 1
          fi
          echo "All commits have a Signed-off-by line."

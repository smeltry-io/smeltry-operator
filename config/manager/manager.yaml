apiVersion: v1
kind: Namespace
metadata:
  name: smeltry-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smeltry-operator
  namespace: smeltry-system
  labels:
    app.kubernetes.io/name: smeltry-operator
    app.kubernetes.io/component: manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smeltry-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smeltry-operator
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: smeltry-operator
      terminationGracePeriodSeconds: 30
      containers:
        - name: manager
          image: ghcr.io/smeltry-io/smeltry-operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
            - --log-level=info
            - --config-map=smeltry-operator-config
            - --netbox-secret=smeltry-operator-netbox
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      securityContext:
        runAsNonRoot: true
